name: Daily Content Generator

on:
  schedule:
    # 每天北京时间 06:00 (UTC 22:00)
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate Daily Content
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: node scripts/generate-daily-content.js

      - name: Check Balance and Alert
        if: failure()
        run: |
          echo "::error::Daily content generation failed. Check API key or network."
          echo "Triggered at: $(date -u)"
